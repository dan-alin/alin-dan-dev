{
  "categories": [
    {
      "title": "## 🚀 Features",
      "labels": ["feat"]
    },
    {
      "title": "## 🐛 Bug Fixes",
      "labels": ["fix"]
    },
    {
      "title": "## 🧰 Maintenance",
      "labels": ["chore", "docs", "style", "refactor", "perf", "test"]
    }
  ],
  "template": "#{{CHANGELOG}}\n\n<details>\n<summary>📦 Uncategorized Changes</summary>\n\n#{{UNCATEGORIZED}}\n</details>",
  "pr_template": "- #{{TITLE}} (#{{AUTHOR}})",
  "empty_template": "- No notable changes",
  "label_extractor": [
    {
      "pattern": "^(feat|fix|chore|docs|style|refactor|perf|test)(\\(.+\\))?: .+$",
      "target": "$1"
    }
  ]
}
